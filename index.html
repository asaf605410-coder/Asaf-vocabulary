<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הלומדה של אסף</title>
    <style>
        :root { --level-color: #0077b6; --bg-color: #f4f6f8; --card-bg: #ffffff; --text-main: #2b2d42; --success: #2a9d8f; --danger: #e76f51; }
        body { background-color: var(--bg-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .screen { display: none; width: 100%; max-width: 400px; }
        .screen.active { display: flex; flex-direction: column; }
        .triage-card { background: var(--card-bg); padding: 25px; border-radius: 20px; text-align: center; border-top: 6px solid var(--level-color); }
        .eng { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; direction: ltr; }
        .heb { font-size: 1.8rem; color: var(--level-color); margin-bottom: 20px; }
        .hidden { display: none; }
        .btn-reveal { background: #6c757d; color: white; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-bottom: 20px; cursor: pointer; }
        .actions { display: flex; gap: 10px; }
        .btn-act { flex: 1; padding: 15px; border: none; border-radius: 15px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="screen-dashboard" class="screen active">
        <h2>הלומדה של אסף</h2>
        <button onclick="startLevel(1, '#0077b6')">רמה 1: בסיס</button>
    </div>

    <div id="screen-triage" class="screen">
        <div class="triage-card">
            <div class="eng" id="triage-eng"></div>
            <button id="btn-reveal" class="btn-reveal" onclick="reveal()">הצג תרגום</button>
            <div class="heb hidden" id="triage-heb"></div>
            <div id="triage-actions" class="actions hidden">
                <button class="btn-act" style="background:var(--danger)" onclick="next()">❌ לא מכיר</button>
                <button class="btn-act" style="background:var(--success)" onclick="next()">✅ מכיר</button>
            </div>
        </div>
    </div>

    <script>
        let db = [], current = 0;
        fetch('words.json').then(r => r.json()).then(data => db = data);

        function startLevel(lvl, color) {
            document.documentElement.style.setProperty('--level-color', color);
            document.getElementById('screen-dashboard').classList.remove('active');
            document.getElementById('screen-triage').classList.add('active');
            load();
        }

        function load() {
            let word = db[Math.floor(Math.random() * db.length)];
            document.getElementById('triage-eng').innerText = word.eng;
            document.getElementById('triage-heb').innerText = word.heb;
            document.getElementById('triage-heb').classList.add('hidden');
            document.getElementById('btn-reveal').classList.remove('hidden');
            document.getElementById('triage-actions').classList.add('hidden');
        }

        function reveal() {
            document.getElementById('triage-heb').classList.remove('hidden');
            document.getElementById('btn-reveal').classList.add('hidden');
            document.getElementById('triage-actions').classList.remove('hidden');
        }

        function next() { load(); }
    </script>
</body>
</html>
